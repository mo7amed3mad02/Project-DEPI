                var itemId = 'item' + idx + '_' + i;
                var item = $('<div class="dropdown-item"><input type="checkbox" id="' + itemId + '" value="' + val + '" checked><label for="' + itemId + '">' + val + '</label></div>');
                menu.append(item);
              });
              dropdown.append(btn).append(menu);
              btn.on('click', function(e) {
                e.stopPropagation();
                if (!menu.hasClass('show')) {
                  var btnPos = btn[0].getBoundingClientRect();
                  menu.appendTo('body').css({ position: 'fixed', top: btnPos.bottom + 'px', left: btnPos.left + 'px', width: Math.max(btnPos.width, 200) + 'px' }).addClass('show');
                } else {
                  menu.removeClass('show').appendTo(dropdown);
                }
              });
              $(document).on('click', function(e) { if (!dropdown.is(e.target) && dropdown.has(e.target).length === 0 && !menu.is(e.target) && menu.has(e.target).length === 0) { menu.removeClass('show').appendTo(dropdown); } });
              function updateFilter() {
                var checked = menu.find('input[type="checkbox"]:not(#selectAll' + idx + '):checked');
                var total = menu.find('input[type="checkbox"]:not(#selectAll' + idx + ')').length;
                if (checked.length === 0) { btn.find('.btn-text').html('None'); column.search('(?!.*)').draw(); }
                else if (checked.length === total) { btn.find('.btn-text').html('All'); column.search('').draw(); }
                else {
                  var vals = checked.map(function() { return $.fn.dataTable.util.escapeRegex($(this).val()); }).get();
                  btn.find('.btn-text').html(checked.length + ' selected');
                  column.search('^(' + vals.join('|') + ')$', true, false).draw();
                }
                selectAllItem.find('input').prop('checked', checked.length === total).prop('indeterminate', checked.length > 0 && checked.length < total);
              }
              menu.find('input[type="checkbox"]:not(#selectAll' + idx + ')').on('change', updateFilter);
              selectAllItem.find('input').on('change', function() {
                var isChecked = $(this).prop('checked');
                menu.find('input[type="checkbox"]:not(#selectAll' + idx + ')').prop('checked', isChecked);
                updateFilter();
              });
              th.append(dropdown);
            }
          });
          // Sync filter visibility with column visibility
          var filterRow = $('.filter-row');
          api.on('column-visibility.dt', function(e, settings, colIdx, visible) {
            filterRow.find('th[data-col-idx="' + colIdx + '"]').toggle(visible);
          });
        }
      });
    });
    // Dark mode toggle with localStorage persistence
    const darkToggle = document.getElementById('darkModeToggle');
    document.querySelector('.theme-switch-free').addEventListener('click', function(e) {
      e.preventDefault();
      if (confirm('Dark Mode is a PRO feature.' + String.fromCharCode(10) + String.fromCharCode(10) + 'Would you like to upgrade to TablePop PRO?')) {
        window.open('https://pythonandvba.com/go/tablepop-checkout', '_blank');
      }
    });
    document.querySelector('.theme-label-free').addEventListener('click', function(e) {
      e.preventDefault();
      if (confirm('Dark Mode is a PRO feature.' + String.fromCharCode(10) + String.fromCharCode(10) + 'Would you like to upgrade to TablePop PRO?')) {
        window.open('https://pythonandvba.com/go/tablepop-checkout', '_blank');
      }
    });
  </script>
